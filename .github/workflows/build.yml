name: build-and-deploy
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Validate repository
        run: |
          python3 tests/structure_test.py
          python3 tests/frontmatter_test.py
          python3 tests/yaml_empty_test.py
      - name: Render site
        run: quarto render
      - name: Bind custom domain
        run: cp website/CNAME build/_site/CNAME
      - name: Sanity check output
        run: |
          test -f build/_site/index.html
          test -f build/_site/public-experience/press-room/brief-5min-es-AR.html
          test -f build/_site/public-experience/decision-simulator/simulator.html
          echo "sanity OK: paginas-chave presentes no artefato"
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/_site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
