name: living-manifesto
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
permissions:
  contents: write
  issues: write
  actions: write
jobs:
  recompile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pyyaml
      - name: Recompile manifesto + radar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/manifesto-build.py
          python3 scripts/engagement-radar.py
      - name: Commit + trigger site rebuild
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "baflp-bot"
          git config user.email "bot@baflp"
          git add manifesto.qmd manifesto/MANIFESTO.md manifesto/results.json manifesto/engagement.json manifesto/engagement-history.jsonl radar.qmd
          if ! git diff --cached --quiet; then
            git commit -m "chore(bot): daily manifesto + engagement radar"
            git push
            gh workflow run build.yml || true
          fi
