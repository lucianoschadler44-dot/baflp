name: living-manifesto
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
permissions:
  contents: write
  issues: read
jobs:
  recompile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pyyaml
      - run: python3 scripts/manifesto-build.py
        env:
          GH_TOKEN: ${{ github.token }}
      - run: |
          git config user.name "baflp-manifesto-bot"
          git config user.email "manifesto@baflp"
          git add manifesto.qmd manifesto/MANIFESTO.md
          git diff --cached --quiet || { git commit -m "chore(manifesto): daily recompilation from live consultation"; git push; }
