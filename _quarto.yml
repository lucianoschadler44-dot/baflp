project:
  type: website
  output-dir: build/_site
  render:
    - "index.qmd"
    - "es.qmd"
    - "pt.qmd"
    - "about.qmd"
    - "glossary.qmd"
    - "core/"
    - "institution/"
    - "observatory/"
    - "public-experience/"
    - "model-law/"
    - "registry/"
    - "research/"
    - "governance/"
    - "docs/"

website:
  title: "BAFLP"
  description: "The Buenos Aires Framework for Artificial Legal Personhood"
  site-url: "https://research.schadler.tech"
  reader-mode: true
  search:
    location: navbar
    type: overlay
  navbar:
    background: light
    pinned: true
    left:
      - text: "Observatory"
        href: observatory/README.md
      - text: "Concepts"
        href: core/concepts/README.md
      - text: "Model Law"
        href: model-law/README.md
      - text: "Simulator"
        href: public-experience/decision-simulator/simulator.qmd
      - text: "Compare"
        href: public-experience/compare/compare.qmd
      - text: "Glossary"
        href: glossary.qmd
      - text: "About"
        href: about.qmd
    right:
      - text: "ES"
        href: es.qmd
      - text: "PT"
        href: pt.qmd
      - icon: github
        href: "https://github.com/lucianoschadler44-dot/baflp"
  page-footer:
    left: "BAFLP — CC BY 4.0 (content) · MIT (code)"
    right: "Desenvolvido por Schadler Tech · Schadler.Tech.IA@gmail.com · (45) 99113-3461"

bibliography: bibliography/references.bib

format:
  html:
    theme:
      - cosmo
      - website/theme.scss
    toc: true
    code-copy: true
    citations-hover: true
